services:
  recbot:
    build: .
    image: collxct-recbot:latest
    container_name: collxct-recbot
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - recbot_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: collxct-recbot-nginx
    restart: unless-stopped
    depends_on:
      - recbot
    ports:
      - "${PUBLIC_PORT:-8443}:8443"
    volumes:
      - ./nginx/recbot.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://127.0.0.1:8443/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  recbot_data:

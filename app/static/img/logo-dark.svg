<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 44" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="xg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Icon box -->
  <rect width="44" height="44" rx="12" fill="url(#bg)"/>
  <rect width="44" height="26" rx="12" fill="url(#sheen)"/>
  <!-- C arc -->
  <path d="M32,9.5 A12.5,12.5 0 1,0 32,34.5"
        stroke="white" stroke-width="3.6" stroke-linecap="round" fill="none"/>
  <!-- Arrow chevron -->
  <path d="M29,6.5 L32,9.5 L35,6.5"
        stroke="white" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Naira lines -->
  <line x1="7" y1="19.5" x2="31" y2="19.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="7" y1="25" x2="31" y2="25" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wordmark: white text, gold x -->
  <text font-family="Inter,-apple-system,BlinkMacSystemFont,system-ui,sans-serif"
        font-weight="800" font-size="20" letter-spacing="-0.8">
    <tspan x="56" y="28" fill="white">coll</tspan>
    <tspan fill="url(#xg)">x</tspan>
    <tspan fill="white">ct</tspan>
  </text>
</svg>
